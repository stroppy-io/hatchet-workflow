# =============================================================================
# GitHub Actions: Database Performance Regression Testing on PR
# =============================================================================
#
# Builds .deb packages from both base and PR branches, runs stroppy benchmarks,
# compares results, and posts a comment on the PR with the comparison link.
#
# Repository secrets needed:
#   STROPPY_URL       - e.g. http://stroppy.internal:8080
#   STROPPY_USER      - e.g. ci-bot
#   STROPPY_PASSWORD  - e.g. ****
# =============================================================================

name: Performance Regression Test

on:
  pull_request:
    branches: [main]

env:
  STROPPY_URL: ${{ secrets.STROPPY_URL }}
  DB_VERSION: "16"
  DB_KIND: "postgres"
  WORKLOAD: "tpcb"
  DURATION: "5m"
  WORKERS: "8"
  THRESHOLD: "5"

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Build .deb from base branch
  # -----------------------------------------------------------------------
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Build .deb package (base branch)
        run: |
          sudo apt-get update && sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install fpm
          # Replace with your actual build commands:
          make build-deb DB_VERSION=$DB_VERSION
          mv *.deb base-branch.deb

      - uses: actions/upload-artifact@v4
        with:
          name: base-deb
          path: base-branch.deb

  # -----------------------------------------------------------------------
  # Job 2: Build .deb from PR branch
  # -----------------------------------------------------------------------
  build-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb package (PR branch)
        run: |
          sudo apt-get update && sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install fpm
          make build-deb DB_VERSION=$DB_VERSION
          mv *.deb pr-branch.deb

      - uses: actions/upload-artifact@v4
        with:
          name: pr-deb
          path: pr-branch.deb

  # -----------------------------------------------------------------------
  # Job 3: Run benchmarks for both branches (sequential to avoid resource contention)
  # -----------------------------------------------------------------------
  benchmark:
    needs: [build-base, build-pr]
    runs-on: ubuntu-latest
    outputs:
      base_run_id: ${{ steps.run.outputs.base_run_id }}
      pr_run_id: ${{ steps.run.outputs.pr_run_id }}
      compare_url: ${{ steps.compare.outputs.compare_url }}
      worse_count: ${{ steps.compare.outputs.worse_count }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: base-deb
      - uses: actions/download-artifact@v4
        with:
          name: pr-deb

      - name: Authenticate
        id: auth
        run: |
          TOKEN=$(curl -sf -X POST "$STROPPY_URL/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${{ secrets.STROPPY_USER }}\",\"password\":\"${{ secrets.STROPPY_PASSWORD }}\"}" \
            | jq -r .token)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Upload packages
        id: upload
        run: |
          AUTH="Authorization: Bearer ${{ steps.auth.outputs.token }}"

          BASE_URL=$(curl -sf -X POST "$STROPPY_URL/api/v1/upload/deb" \
            -H "$AUTH" -F file=@base-branch.deb | jq -r .url)
          echo "base_pkg_url=$BASE_URL" >> $GITHUB_OUTPUT

          PR_URL=$(curl -sf -X POST "$STROPPY_URL/api/v1/upload/deb" \
            -H "$AUTH" -F file=@pr-branch.deb | jq -r .url)
          echo "pr_pkg_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Run benchmarks
        id: run
        run: |
          AUTH="Authorization: Bearer ${{ steps.auth.outputs.token }}"
          BASE_RUN="ci-base-${{ github.run_id }}"
          PR_RUN="ci-pr-${{ github.run_id }}"

          # --- Run base branch benchmark ---
          echo "Starting base branch benchmark: $BASE_RUN"
          curl -sf -X POST "$STROPPY_URL/api/v1/run" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d "{
              \"id\": \"$BASE_RUN\",
              \"provider\": \"docker\",
              \"network\": {\"cidr\": \"10.10.0.0/24\"},
              \"machines\": [],
              \"database\": {\"kind\": \"$DB_KIND\", \"version\": \"$DB_VERSION\",
                \"postgres\": {\"master\": {\"role\": \"database\", \"count\": 1, \"cpus\": 2, \"memory_mb\": 4096, \"disk_gb\": 50}}},
              \"monitor\": {},
              \"stroppy\": {\"version\": \"3.1.0\", \"workload\": \"$WORKLOAD\", \"duration\": \"$DURATION\", \"workers\": $WORKERS},
              \"packages\": {\"deb_files\": [\"${{ steps.upload.outputs.base_pkg_url }}\"]}
            }"

          # Wait for base run
          while true; do
            S=$(curl -sf "$STROPPY_URL/api/v1/run/$BASE_RUN/status" -H "$AUTH")
            F=$(echo "$S" | jq '[.nodes[] | select(.status=="failed")] | length')
            P=$(echo "$S" | jq '[.nodes[] | select(.status=="pending")] | length')
            [ "$F" -gt 0 ] && { echo "::error::Base run failed"; exit 1; }
            [ "$P" -eq 0 ] && break
            sleep 10
          done
          echo "Base run completed"

          # --- Run PR branch benchmark ---
          echo "Starting PR branch benchmark: $PR_RUN"
          curl -sf -X POST "$STROPPY_URL/api/v1/run" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d "{
              \"id\": \"$PR_RUN\",
              \"provider\": \"docker\",
              \"network\": {\"cidr\": \"10.20.0.0/24\"},
              \"machines\": [],
              \"database\": {\"kind\": \"$DB_KIND\", \"version\": \"$DB_VERSION\",
                \"postgres\": {\"master\": {\"role\": \"database\", \"count\": 1, \"cpus\": 2, \"memory_mb\": 4096, \"disk_gb\": 50}}},
              \"monitor\": {},
              \"stroppy\": {\"version\": \"3.1.0\", \"workload\": \"$WORKLOAD\", \"duration\": \"$DURATION\", \"workers\": $WORKERS},
              \"packages\": {\"deb_files\": [\"${{ steps.upload.outputs.pr_pkg_url }}\"]}
            }"

          # Wait for PR run
          while true; do
            S=$(curl -sf "$STROPPY_URL/api/v1/run/$PR_RUN/status" -H "$AUTH")
            F=$(echo "$S" | jq '[.nodes[] | select(.status=="failed")] | length')
            P=$(echo "$S" | jq '[.nodes[] | select(.status=="pending")] | length')
            [ "$F" -gt 0 ] && { echo "::error::PR run failed"; exit 1; }
            [ "$P" -eq 0 ] && break
            sleep 10
          done
          echo "PR run completed"

          echo "base_run_id=$BASE_RUN" >> $GITHUB_OUTPUT
          echo "pr_run_id=$PR_RUN" >> $GITHUB_OUTPUT

      - name: Compare results
        id: compare
        run: |
          AUTH="Authorization: Bearer ${{ steps.auth.outputs.token }}"
          BASE_RUN="${{ steps.run.outputs.base_run_id }}"
          PR_RUN="${{ steps.run.outputs.pr_run_id }}"

          RESULT=$(curl -sf "$STROPPY_URL/api/v1/compare?a=$BASE_RUN&b=$PR_RUN&threshold=$THRESHOLD" -H "$AUTH")

          # Print table
          echo "## Performance Comparison"
          echo ""
          echo "| Metric | Base | PR | Diff | Verdict |"
          echo "|--------|------|----|------|---------|"
          echo "$RESULT" | jq -r '.metrics[] | "| \(.name) | \(.avg_a | tostring | .[0:8]) | \(.avg_b | tostring | .[0:8]) | \(.diff_avg_pct | tostring | .[0:6])% | \(.verdict) |"'

          WORSE=$(echo "$RESULT" | jq '.summary.worse')
          BETTER=$(echo "$RESULT" | jq '.summary.better')
          SAME=$(echo "$RESULT" | jq '.summary.same')
          echo ""
          echo "Summary: $BETTER better, $WORSE worse, $SAME same"

          echo "compare_url=$STROPPY_URL/compare?a=$BASE_RUN&b=$PR_RUN" >> $GITHUB_OUTPUT
          echo "worse_count=$WORSE" >> $GITHUB_OUTPUT

          # Generate JUnit for GitHub test summary
          echo '<?xml version="1.0" encoding="UTF-8"?>' > comparison-report.xml
          TOTAL=$(echo "$RESULT" | jq '.metrics | length')
          echo "<testsuite name=\"stroppy-perf\" tests=\"$TOTAL\" failures=\"$WORSE\">" >> comparison-report.xml
          echo "$RESULT" | jq -r '.metrics[] | "<testcase name=\"\(.name)\" classname=\"stroppy.\(.key)\">" + (if .verdict == "worse" then "<failure message=\"regressed by \(.diff_avg_pct)%\">base=\(.avg_a) pr=\(.avg_b)</failure>" else "" end) + "</testcase>"' >> comparison-report.xml
          echo "</testsuite>" >> comparison-report.xml

      - uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: comparison-report.xml
          check_name: "Stroppy Performance"

      - name: Fail on regression
        if: steps.compare.outputs.worse_count > 2
        run: |
          echo "::error::Performance regression detected: ${{ steps.compare.outputs.worse_count }} metrics worse"
          exit 1

  # -----------------------------------------------------------------------
  # Job 4: Post PR comment with results
  # -----------------------------------------------------------------------
  comment:
    needs: [benchmark]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const baseRun = '${{ needs.benchmark.outputs.base_run_id }}';
            const prRun = '${{ needs.benchmark.outputs.pr_run_id }}';
            const compareUrl = '${{ needs.benchmark.outputs.compare_url }}';
            const worse = parseInt('${{ needs.benchmark.outputs.worse_count }}' || '0');

            const status = worse > 2 ? '🔴 REGRESSION' : '🟢 PASS';

            const body = `## ${status} Stroppy Performance Report

            | Run | ID |
            |---|---|
            | Base (\`${{ github.event.pull_request.base.ref }}\`) | \`${baseRun}\` |
            | PR (\`${{ github.event.pull_request.head.ref }}\`) | \`${prRun}\` |

            [View full comparison](${compareUrl})

            _Threshold: ${process.env.THRESHOLD}% · Regressions: ${worse}_`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.split('\n').map(l => l.trim()).join('\n')
            });
